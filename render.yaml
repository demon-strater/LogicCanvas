services:
  - type: web
    name: logiccanvas
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: logiccanvas-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: logiccanvas-db
    plan: basic-256mb
